
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leolife OS v3 - Multi-Project Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .kanban-column { min-height: 400px; }
        .task-card { transition: transform 0.2s, border-color 0.2s; }
        .task-card:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.5); }
        .project-tab { transition: all 0.3s; cursor: pointer; }
        .project-tab.active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); color: #60a5fa; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950">
    
    <div class="max-w-7xl mx-auto">
        <!-- TOP NAV -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="h-3 w-3 rounded-full bg-blue-500 animate-pulse"></div>
                    <h1 class="text-4xl font-extrabold tracking-tight text-white uppercase">LEO<span class="text-blue-500">LIFE</span></h1>
                </div>
                <p id="sync-info" class="text-slate-500 text-sm font-medium tracking-wide"></p>
            </div>
            
            <!-- Project Switcher -->
            <div class="flex gap-2 bg-slate-900/50 p-1 rounded-2xl border border-white/5" id="project-switcher">
                <!-- Project tabs will be injected here -->
            </div>
        </header>

        <!-- STATS / HEALTH -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass p-5 rounded-3xl relative overflow-hidden group">
                <div class="flex justify-between items-start mb-4">
                    <i data-lucide="droplets" class="text-blue-400"></i>
                    <span class="text-xs font-bold text-blue-400 bg-blue-400/10 px-2 py-1 rounded-full" id="water-pct">48%</span>
                </div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Hydration</h3>
                <p class="text-2xl font-bold text-white" id="water-val">1.2 / 2.5 L</p>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="water-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 48%"></div>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl group">
                <div class="flex justify-between items-start mb-4">
                    <i data-lucide="swords" class="text-red-400"></i>
                </div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Sport Focus</h3>
                <p class="text-2xl font-bold text-white" id="workout-val">Muay Thai</p>
                <p class="text-xs text-red-400 mt-2 flex items-center gap-1 font-medium italic">
                    <i data-lucide="clock" size="12"></i> Check schedule
                </p>
            </div>

            <div class="glass p-5 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <i data-lucide="layout" class="text-purple-400"></i>
                </div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Vibe Coding</h3>
                <p class="text-2xl font-bold text-white" id="task-count">0</p>
                <p class="text-xs text-slate-500 mt-2">Course Launch Prep</p>
            </div>

            <div class="glass p-5 rounded-3xl bg-gradient-to-br from-blue-600/10 to-transparent">
                <div class="flex justify-between items-start mb-4">
                    <i data-lucide="brain-circuit" class="text-blue-300"></i>
                </div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">AI Context</h3>
                <p class="text-sm font-medium text-slate-300 leading-relaxed" id="ai-context">Syncing tasks...</p>
            </div>
        </div>

        <!-- KANBAN BOARD -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="kanban-board">
            <!-- Columns will be injected here -->
        </div>

        <!-- FOOTER NOTES -->
        <div class="mt-12">
             <div class="flex items-center gap-2 mb-4 text-slate-500">
                <i data-lucide="sticky-note" size="16"></i>
                <h2 class="text-xs font-bold uppercase tracking-widest">System Notes</h2>
            </div>
            <textarea id="local-notes" class="w-full h-32 glass rounded-3xl p-6 text-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all" placeholder="Quick capture... (Saves locally)"></textarea>
        </div>
    </div>

    <script>
        
const DASHBOARD_DATA = {
    user: "Leogelv",
    location: "Da Nang",
    lastSync: new Date().toLocaleString(),
    activeProjectId: 'revolt',
    projects: [
        { id: 'revolt', name: 'Revolt Group', status: 'Active', color: 'blue' },
        { id: 'vibecoding', name: 'Vibe Coding Course', status: 'Launching', color: 'purple' },
        { id: 'danang-hub', name: 'Danang Hub App', status: 'Building', color: 'emerald' }
    ],
    kanban: [
        {
            id: 'priority',
            title: '🚀 В приоритете',
            tasks: [
                { id: 101, text: 'Дананг-хаб апп: забилдить проект', tag: 'System', priority: 'High' },
                { id: 102, text: 'Встреча с Ником: доработать проект/задачи', tag: 'Meeting', priority: 'High' },
                { id: 103, text: 'Оффер для Revolt: подготовить и отправить', tag: 'Business', priority: 'High' }
            ]
        },
        {
            id: 'dev-content',
            title: '🤖 Разработка и Контент',
            tasks: [
                { id: 201, text: 'Бот для курса Вайбкодинга: разработка функционала', tag: 'VibeCoding', priority: 'Medium' },
                { id: 202, text: 'Видео на YouTube: ролик по боту', tag: 'YouTube', priority: 'Medium' }
            ]
        },
        {
            id: 'personal',
            title: '🥊 Личное / Спорт',
            tasks: [
                { id: 301, text: 'Муай-тай: записаться на тренировку', tag: 'Health', priority: 'Medium' }
            ]
        }
    ],
    health: {
        water: { current: 1.2, goal: 2.5, unit: 'L' },
        workout: { status: 'Pending', label: 'Muay Thai' }
    }
};


        function renderDashboard() {
            document.getElementById('sync-info').innerText = `${DASHBOARD_DATA.location} | Last Sync: ${DASHBOARD_DATA.lastSync}`;
            
            // Render Project Switcher
            const switcher = document.getElementById('project-switcher');
            switcher.innerHTML = DASHBOARD_DATA.projects.map(p => `
                <div class="project-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider border border-transparent ${DASHBOARD_DATA.activeProjectId === p.id ? 'active' : 'text-slate-500'}" onclick="switchProject('${p.id}')">
                    ${p.name}
                </div>
            `).join('');

            // Render Stats
            const h = DASHBOARD_DATA.health;
            const waterPct = Math.round((h.water.current / h.water.goal) * 100);
            document.getElementById('water-pct').innerText = `${waterPct}%`;
            document.getElementById('water-val').innerText = `${h.water.current} / ${h.water.goal} ${h.water.unit}`;
            document.getElementById('water-bar').style.width = `${waterPct}%`;
            document.getElementById('workout-val').innerText = h.workout.label;
            document.getElementById('ai-context').innerText = `Focused on ${DASHBOARD_DATA.projects.find(p => p.id === DASHBOARD_DATA.activeProjectId).name}. GitHub sync active.`;

            // Render Kanban
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';
            let totalTasks = 0;

            DASHBOARD_DATA.kanban.forEach(col => {
                totalTasks += col.tasks.length;
                const colHtml = `
                    <div class="kanban-column">
                        <div class="flex items-center justify-between mb-6 px-2">
                            <h2 class="font-bold text-slate-400 text-sm uppercase tracking-[0.2em]">${col.title}</h2>
                            <span class="text-[10px] font-bold bg-slate-800 text-slate-500 px-2 py-0.5 rounded-full">${col.tasks.length}</span>
                        </div>
                        <div class="space-y-4">
                            ${col.tasks.map(task => `
                                <div class="task-card glass p-5 rounded-2xl border-l-2 border-transparent relative group cursor-pointer">
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400 uppercase tracking-wider">${task.tag}</span>
                                        <div class="h-2 w-2 rounded-full ${task.priority === 'High' ? 'bg-red-500' : 'bg-slate-700'}"></div>
                                    </div>
                                    <p class="text-sm font-semibold text-slate-200 mb-4 leading-snug">${task.text}</p>
                                    <div class="flex justify-between items-center opacity-40 group-hover:opacity-100 transition-opacity">
                                        <div class="flex gap-2">
                                            <i data-lucide="check-circle" size="12"></i>
                                            <i data-lucide="calendar" size="12"></i>
                                        </div>
                                        <i data-lucide="external-link" size="14"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                board.innerHTML += colHtml;
            });

            document.getElementById('task-count').innerText = totalTasks;
            lucide.createIcons();
        }

        function switchProject(id) {
            DASHBOARD_DATA.activeProjectId = id;
            renderDashboard();
        }

        // Local Storage for notes
        const notesArea = document.getElementById('local-notes');
        notesArea.value = localStorage.getItem('leolife_notes_v3') || '';
        notesArea.addEventListener('input', (e) => {
            localStorage.setItem('leolife_notes_v3', e.target.value);
        });

        renderDashboard();
    </script>
</body>
</html>
