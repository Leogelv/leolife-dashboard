<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leolife OS v12 — Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4 md:p-8 lg:p-10">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="content-wrapper max-w-[1400px] mx-auto">

        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 rounded-2xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i data-lucide="command" class="text-white w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">LEOLIFE <span class="bg-gradient-to-r from-blue-500 to-violet-500 bg-clip-text text-transparent">OS</span></h1>
                    <p id="sync-info" class="text-[10px] font-bold uppercase tracking-[0.2em]" style="color: var(--text-muted)"></p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="resetToken()" class="glass p-3 rounded-xl hover:scale-105 transition-transform" title="Change GitHub token">
                    <i data-lucide="key-round" class="w-5 h-5"></i>
                </button>
                <button onclick="toggleTheme()" class="glass p-3 rounded-xl hover:scale-105 transition-transform" title="Toggle theme">
                    <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-1 glass-strong p-1.5 rounded-2xl" id="project-switcher"></div>
            </div>
        </header>

        <!-- BENTO GRID -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-8">
            <!-- Mission -->
            <div class="md:col-span-5 glass p-7 rounded-3xl relative overflow-hidden pulse-border">
                <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-violet-500/5"></div>
                <div class="relative">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="crosshair" class="w-4 h-4" style="color: var(--accent)"></i>
                        <span class="text-[10px] font-black uppercase tracking-[0.25em]" style="color: var(--accent)">Current Mission</span>
                    </div>
                    <p class="text-xl font-bold mb-5 leading-snug" id="active-mission">Loading...</p>
                    <div class="flex flex-wrap gap-2" id="mission-badges"></div>
                </div>
            </div>
            <!-- Challenge -->
            <div class="md:col-span-4 glass p-7 rounded-3xl relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-cyan-500/5"></div>
                <div class="relative">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="flame" class="w-4 h-4" style="color: var(--success)"></i>
                        <span class="text-[10px] font-black uppercase tracking-[0.25em]" style="color: var(--success)">Mentor Challenge</span>
                    </div>
                    <p class="text-sm font-medium mb-5 italic leading-relaxed" style="color: var(--text-muted)" id="challenge-text">Loading...</p>
                    <button onclick="completeChallenge()" class="w-full py-3 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] transition-all hover:scale-[1.02]" style="background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2)">
                        Submit Proof
                    </button>
                </div>
            </div>
            <!-- Stats -->
            <div class="md:col-span-3 glass p-7 rounded-3xl">
                <div class="flex items-center gap-2 mb-5">
                    <i data-lucide="bar-chart-3" class="w-4 h-4" style="color: var(--text-muted)"></i>
                    <span class="text-[10px] font-black uppercase tracking-[0.25em]" style="color: var(--text-muted)">Progress</span>
                </div>
                <div class="space-y-4" id="stats-container"></div>
            </div>
        </div>

        <!-- KANBAN -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="kanban-board">
            <div class="kanban-column" id="col-todo">
                <div class="flex justify-between items-center mb-6 px-1">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full" style="background: var(--text-muted)"></div>
                        <h2 class="font-bold text-[10px] uppercase tracking-[0.3em]" style="color: var(--text-muted)">To Do</h2>
                    </div>
                    <span class="count text-[11px] font-bold px-2.5 py-0.5 rounded-lg" style="background: var(--surface); color: var(--text-muted)">0</span>
                </div>
                <div class="task-list space-y-3" data-col="todo"></div>
            </div>
            <div class="kanban-column" id="col-inprogress">
                <div class="flex justify-between items-center mb-6 px-1">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full" style="background: var(--accent)"></div>
                        <h2 class="font-bold text-[10px] uppercase tracking-[0.3em]" style="color: var(--accent)">In Progress</h2>
                    </div>
                    <span class="count text-[11px] font-bold px-2.5 py-0.5 rounded-lg" style="background: var(--accent-glow); color: var(--accent)">0</span>
                </div>
                <div class="task-list space-y-3" data-col="inprogress"></div>
            </div>
            <div class="kanban-column" id="col-done">
                <div class="flex justify-between items-center mb-6 px-1">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full" style="background: var(--success)"></div>
                        <h2 class="font-bold text-[10px] uppercase tracking-[0.3em]" style="color: var(--success)">Done</h2>
                    </div>
                    <span class="count text-[11px] font-bold px-2.5 py-0.5 rounded-lg" style="background: rgba(16, 185, 129, 0.1); color: var(--success)">0</span>
                </div>
                <div class="task-list space-y-3" data-col="done"></div>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]" style="color: var(--text-muted)">Leolife OS v12 — Built with focus, not distraction</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
