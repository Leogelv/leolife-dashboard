
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leolife OS v4 - Pro Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .kanban-column { min-height: 500px; background: rgba(255,255,255,0.02); border-radius: 24px; padding: 16px; }
        .task-card { transition: all 0.2s; cursor: grab; }
        .task-card:active { cursor: grabbing; }
        .project-tab.active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); color: #60a5fa; }
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-900/10 via-slate-950 to-slate-950">
    
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">LEOLIFE <span class="text-blue-500 italic">PRO</span></h1>
                <p id="sync-info" class="text-slate-500 text-sm"></p>
            </div>
            <div class="flex gap-2 bg-slate-900/50 p-1 rounded-2xl border border-white/5" id="project-switcher"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="kanban-board">
            <!-- Columns: todo, inprogress, done -->
            <div class="kanban-column" id="col-todo">
                <h2 class="font-bold text-slate-400 text-xs uppercase tracking-widest mb-6 px-2 flex items-center justify-between">
                    To Do <span class="count bg-slate-800 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div class="task-list space-y-4 min-h-[400px]" data-col="todo"></div>
            </div>
            <div class="kanban-column" id="col-inprogress">
                <h2 class="font-bold text-blue-400 text-xs uppercase tracking-widest mb-6 px-2 flex items-center justify-between">
                    In Progress <span class="count bg-blue-500/10 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div class="task-list space-y-4 min-h-[400px]" data-col="inprogress"></div>
            </div>
            <div class="kanban-column" id="col-done">
                <h2 class="font-bold text-emerald-400 text-xs uppercase tracking-widest mb-6 px-2 flex items-center justify-between">
                    Done <span class="count bg-emerald-500/10 px-2 py-0.5 rounded text-[10px]">0</span>
                </h2>
                <div class="task-list space-y-4 min-h-[400px]" data-col="done"></div>
            </div>
        </div>
    </div>

    <script>
        
const DASHBOARD_DATA = {
    user: "Leogelv",
    location: "Da Nang",
    lastSync: new Date().toLocaleString(),
    activeProjectId: 'revolt',
    projects: [
        { id: 'revolt', name: 'Revolt Group', status: 'Active', color: 'blue' },
        { id: 'vibecoding', name: 'Vibe Coding', status: 'Launching', color: 'purple' },
        { id: 'danang-hub', name: 'Danang Hub', status: 'Building', color: 'emerald' }
    ],
    tasks: [
        // REVOLT
        { id: 1, projectId: 'revolt', column: 'todo', text: 'Request Revolt Pitch Deck', tag: 'Business', priority: 'High', owner: '@leogelv' },
        { id: 2, projectId: 'revolt', column: 'inprogress', text: 'Revolt Website Repackaging', tag: 'Dev', priority: 'High', owner: '@ai_agent' },
        { id: 3, projectId: 'revolt', column: 'todo', text: 'Prepare & Send Strategy Offer', tag: 'Sales', priority: 'High', owner: '@leogelv' },
        
        // VIBE CODING
        { id: 4, projectId: 'vibecoding', column: 'todo', text: 'Бот для курса: разработка логики', tag: 'Dev', priority: 'High', owner: '@developer_nick' },
        { id: 5, projectId: 'vibecoding', column: 'todo', text: 'YouTube: ролик по боту (монтаж)', tag: 'Content', priority: 'Medium', owner: '@editor_pro' },
        { id: 6, projectId: 'vibecoding', column: 'inprogress', text: 'Настройка воронки продаж', tag: 'Marketing', priority: 'High', owner: '@leogelv' },
        
        // DANANG HUB
        { id: 7, projectId: 'danang-hub', column: 'todo', text: 'Дананг-хаб апп: забилдить проект', tag: 'System', priority: 'High', owner: '@leogelv' },
        
        // PERSONAL / SPORT
        { id: 8, projectId: 'all', column: 'todo', text: 'Муай-тай: записаться на тренировку', tag: 'Health', priority: 'Medium', owner: '@leogelv' }
    ],
    health: {
        water: { current: 1.2, goal: 2.5, unit: 'L' },
        workout: { status: 'Pending', label: 'Muay Thai' }
    }
};


        function render() {
            const currentProj = DASHBOARD_DATA.activeProjectId;
            
            // Switcher
            document.getElementById('project-switcher').innerHTML = DASHBOARD_DATA.projects.map(p => `
                <button onclick="switchProject('${p.id}')" class="project-tab px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider border border-transparent ${currentProj === p.id ? 'active' : 'text-slate-500'}">
                    ${p.name}
                </button>
            `).join('');

            // Lists
            ['todo', 'inprogress', 'done'].forEach(colId => {
                const list = document.querySelector(`#col-${colId} .task-list`);
                const filtered = DASHBOARD_DATA.tasks.filter(t => t.column === colId && (t.projectId === currentProj || t.projectId === 'all'));
                
                document.querySelector(`#col-${colId} .count`).innerText = filtered.length;
                
                list.innerHTML = filtered.map(t => `
                    <div class="task-card glass p-5 rounded-2xl border-l-2 ${t.priority === 'High' ? 'border-red-500' : 'border-transparent'}" data-id="${t.id}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400 uppercase tracking-widest">${t.tag}</span>
                            <span class="text-[10px] font-medium text-blue-400">${t.owner}</span>
                        </div>
                        <p class="text-sm font-semibold text-slate-200 leading-snug">${t.text}</p>
                    </div>
                `).join('');
                
                new Sortable(list, {
                    group: 'kanban',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const taskId = evt.item.getAttribute('data-id');
                        const newCol = evt.to.getAttribute('data-col');
                        const task = DASHBOARD_DATA.tasks.find(t => t.id == taskId);
                        if(task) task.column = newCol;
                        render(); // Re-sync counts
                    }
                });
            });
            
            lucide.createIcons();
            document.getElementById('sync-info').innerText = `Sync: ${new Date().toLocaleTimeString()} | Project: ${currentProj}`;
        }

        function switchProject(id) {
            DASHBOARD_DATA.activeProjectId = id;
            render();
        }

        render();
    </script>
</body>
</html>
