
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leolife OS v10 - Elite Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
        }

        .light-theme {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --border: rgba(0, 0, 0, 0.08);
            --accent: #2563eb;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.1);
        }

        .kanban-column { 
            min-height: 650px; 
            background: rgba(125, 125, 125, 0.03); 
            border-radius: 28px; 
            padding: 20px;
        }

        .project-tab { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .project-tab.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .task-card { 
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: grab;
        }
        .task-card:hover { transform: translateY(-2px); }

        .theme-toggle { cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">
    
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i data-lucide="zap" class="text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight uppercase">Leolife <span class="text-blue-600">OS</span></h1>
                    <p id="sync-info" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="glass p-3 rounded-2xl theme-toggle">
                    <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i>
                </button>
                <div class="flex gap-1 bg-slate-900/20 p-1 rounded-2xl border border-white/5 glass" id="project-switcher"></div>
            </div>
        </header>

        <!-- MENTOR DASH -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-10">
            <div class="md:col-span-8 glass p-8 rounded-[2rem] border-l-4 border-blue-500 relative overflow-hidden">
                <div class="flex items-center gap-3 mb-4 text-blue-500">
                    <i data-lucide="target" size="20"></i>
                    <h2 class="text-xs font-black uppercase tracking-[0.2em]">Current Mission</h2>
                </div>
                <p class="text-2xl font-bold mb-4 leading-tight" id="active-mission">Loading mission...</p>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold px-3 py-1 rounded-full bg-blue-500/10 text-blue-500 border border-blue-500/20 uppercase">High Priority</span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Deadline: April 20</span>
                </div>
            </div>
            
            <div class="md:col-span-4 glass p-8 rounded-[2rem] bg-gradient-to-br from-blue-600/5 to-transparent">
                <div class="flex items-center gap-3 mb-4 text-emerald-500">
                    <i data-lucide="award" size="20"></i>
                    <h2 class="text-xs font-black uppercase tracking-[0.2em]">Mentor Challenge</h2>
                </div>
                <p class="text-sm font-medium text-slate-400 mb-4 italic">"How do you stay focused on your dreams?" - Спроси незнакомца.</p>
                <button onclick="completeChallenge()" class="w-full py-3 rounded-xl bg-emerald-500/10 text-emerald-500 text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-white transition-all">Submit Proof</button>
            </div>
        </div>

        <!-- KANBAN -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="kanban-board">
            <div class="kanban-column" id="col-todo">
                <h2 class="font-bold text-slate-400 text-[10px] uppercase tracking-[0.3em] mb-8 px-2 flex justify-between">To Do <span class="count">0</span></h2>
                <div class="task-list space-y-4" data-col="todo"></div>
            </div>
            <div class="kanban-column" id="col-inprogress">
                <h2 class="font-bold text-blue-500 text-[10px] uppercase tracking-[0.3em] mb-8 px-2 flex justify-between">In Progress <span class="count">0</span></h2>
                <div class="task-list space-y-4" data-col="inprogress"></div>
            </div>
            <div class="kanban-column" id="col-done">
                <h2 class="font-bold text-emerald-500 text-[10px] uppercase tracking-[0.3em] mb-8 px-2 flex justify-between">Done <span class="count">0</span></h2>
                <div class="task-list space-y-4" data-col="done"></div>
            </div>
        </div>
    </div>

    <script>
        let DASHBOARD_DATA = {
            activeProjectId: 'money',
            theme: 'dark',
            projects: [
                { id: 'money', name: '💰 Money', mission: 'Закрыть контракт Revolt и упаковать ВШЭ' },
                { id: 'revolt', name: 'Revolt', mission: 'Scale high-ticket AI agency' },
                { id: 'vibecoding', name: 'Vibe Coding', mission: 'Launch HSE course & private stream' },
                { id: 'hobbies', name: '🎨 Hobbies', mission: 'Enjoy the process (Low priority)' }
            ],
            tasks: [
                { id: 1, projectId: 'revolt', column: 'todo', text: 'Revolt: Выслать Roadmap (не ждать их)', tag: 'Money', owner: '@leogelv' },
                { id: 2, projectId: 'revolt', column: 'inprogress', text: 'Revolt Website Repackaging', tag: 'Dev', owner: '@ai_agent' },
                { id: 3, projectId: 'revolt', column: 'done', text: 'Счет парк-отелю отправлен', tag: 'Money', owner: '@leogelv' },
                { id: 4, projectId: 'vibecoding', column: 'inprogress', text: 'ВШЭ: План курса (3 темы)', tag: 'Money', owner: '@leogelv' },
                { id: 5, projectId: 'vibecoding', column: 'todo', text: 'YouTube: 1 мин чернового видео', tag: 'Money', owner: '@leogelv' },
                { id: 6, projectId: 'vibecoding', column: 'done', text: 'Бот: основной функционал', tag: 'Dev', owner: '@leogelv' },
                { id: 7, projectId: 'hobbies', column: 'todo', text: 'EEG API Exploration', tag: 'Fun', owner: '@leogelv' },
                { id: 8, projectId: 'hobbies', column: 'todo', text: 'Music Trio Rehearsal', tag: 'Fun', owner: '@leogelv' }
            ]
        };

        function render() {
            const currentProj = DASHBOARD_DATA.activeProjectId;
            const project = DASHBOARD_DATA.projects.find(p => p.id === currentProj);
            
            document.getElementById('active-mission').innerText = project.mission;
            document.getElementById('sync-info').innerText = `Elite Sync: ${new Date().toLocaleTimeString()} | ${currentProj.toUpperCase()}`;
            
            // Switcher
            document.getElementById('project-switcher').innerHTML = DASHBOARD_DATA.projects.map(p => `
                <button onclick="switchProject('${p.id}')" class="project-tab px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-wider ${currentProj === p.id ? 'active' : 'text-slate-500'}">
                    ${p.name}
                </button>
            `).join('');

            // Columns
            ['todo', 'inprogress', 'done'].forEach(colId => {
                const list = document.querySelector(`#col-${colId} .task-list`);
                // FIXED FILTER LOGIC: If 'money', show all tasks EXCEPT hobbies. Else show project-specific.
                const filtered = DASHBOARD_DATA.tasks.filter(t => 
                    t.column === colId && 
                    (currentProj === 'money' ? (t.projectId !== 'hobbies') : (t.projectId === currentProj))
                );
                
                document.querySelector(`#col-${colId} .count`).innerText = filtered.length;
                list.innerHTML = filtered.map(t => `
                    <div class="task-card glass p-6 rounded-3xl border-l-4 ${t.tag === 'Money' ? 'border-blue-500' : 'border-slate-700'}" data-id="${t.id}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black px-2 py-1 rounded bg-slate-800/10 text-slate-500 uppercase tracking-widest">${t.tag}</span>
                            <span class="text-[10px] font-bold text-blue-500">${t.owner}</span>
                        </div>
                        <p class="text-sm font-bold text-current leading-snug">${t.text}</p>
                    </div>
                `).join('');
                
                new Sortable(list, {
                    group: 'kanban',
                    animation: 200,
                    onEnd: (evt) => {
                        const taskId = evt.item.getAttribute('data-id');
                        const newCol = evt.to.getAttribute('data-col');
                        const task = DASHBOARD_DATA.tasks.find(t => t.id == taskId);
                        if(task) task.column = newCol;
                        render();
                    }
                });
            });
        }

        function switchProject(id) { DASHBOARD_DATA.activeProjectId = id; render(); }
        
        function toggleTheme() {
            DASHBOARD_DATA.theme = DASHBOARD_DATA.theme === 'dark' ? 'light' : 'dark';
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', DASHBOARD_DATA.theme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        }

        render();
        lucide.createIcons();
    </script>
</body>
</html>
